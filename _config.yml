title: "Nelson Eats"
description: "Happy hour deals and drink specials in Nelson, BC"
url: "https://nelsoneats.ca"
baseurl: ""
timezone: America/Vancouver
markdown: kramdown

sass:
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - .claude/
  - vendor/
  - node_modules/

defaults:
  - scope:
      path: "pages/days"
    values:
      layout: "day"
